name: crawl

on:
  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      reset_progress:
        description: "전역 인덱스 초기화 (위험! '1' 입력 시에만, worker 1 만 실행)"
        required: false
        default: "0"
      retry_failed_only:
        description: "실패 키워드만 재시도 ('1' 입력 시 run_all 대신 retry_failed 실행)"
        required: false
        default: "0"

  # 자동 실행 — KST 기준 09:00 / 15:00 / 21:00 (3회/일)
  # GitHub Actions 는 UTC 기준이라 -9시간
  schedule:
    - cron: "0 0 * * *"    # UTC 00:00 = KST 09:00
    - cron: "0 6 * * *"    # UTC 06:00 = KST 15:00
    - cron: "0 12 * * *"   # UTC 12:00 = KST 21:00

# 동일 워크플로 중복 실행 방지
# cron 과 수동 트리거가 겹쳐도 한쪽이 끝날 때까지 대기
concurrency:
  group: crawl-main
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2]    # 429 줄이기 위해 3 → 2개

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p /tmp/secrets
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/secrets/firebase.json
          python -c "import json; json.load(open('/tmp/secrets/firebase.json'))"
          echo "Firebase credentials ready"

      # worker 별 시작 시간 어긋남 — 동시 네이버 요청 폭증 방지
      - name: Stagger start
        run: |
          OFFSET=$(( (${{ matrix.worker }} - 1) * 60 ))
          echo "Staggering $OFFSET seconds..."
          sleep $OFFSET

      - name: Run crawler (full)
        if: ${{ github.event.inputs.retry_failed_only != '1' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/secrets/firebase.json
          COMMANDS_FILE: crawler_commands.txt
          SLEEP_SEC: "120"           # 90 → 120 (429 줄이기)
          MAX_RETRIES: "3"
          RETRY_BASE_SLEEP: "180"
          MAX_RUNTIME_SEC: "20400"
          SAVE_XLSX: "0"
          # cron 실행에서는 절대 리셋 안 됨 (수동 + worker 1 + 명시적 1 입력 시에만)
          RESET_PROGRESS: ${{ github.event_name == 'workflow_dispatch' && matrix.worker == 1 && github.event.inputs.reset_progress == '1' && '1' || '0' }}
        run: python run_all.py

      - name: Run crawler (retry failed only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.retry_failed_only == '1' && matrix.worker == 1 }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/secrets/firebase.json
          SLEEP_SEC: "180"           # retry 는 더 보수적으로
          MAX_RUNTIME_SEC: "20400"
          DEFAULT_MAX: "20"
        run: python retry_failed.py

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/secrets/firebase.json
